name: Mirror to private Kigiela-Co repo

# Keeps Kigiela-Co/skill-16-eyes (a private redistribution point registered
# in the org's Plugins admin panel — Settings > Plugins > "Sync from
# GitHub") up to date with this repo's main branch. That admin panel only
# accepts private/internal repos ("Only private and internal repositories
# are shown. To use a public repository, fork it to a private repo
# first."), so this mirror exists purely to satisfy that restriction — this
# public repo remains the actual source of truth for all development; never
# push changes directly to the private mirror.
#
# The mirror is intentionally MINIMAL — just `.claude-plugin/`, `skills/`,
# and `README.md` — not a full copy of this repo. Mirroring everything
# (npm/CLI source, other-tool integrations, marketing assets/videos) once
# produced an 8.8MB repo that the plugin sync choked on with an opaque "1
# sync error" and zero plugins discovered; the known-working reference
# (Kigiela-Co/skill-guider) is ~50KB with this same minimal shape. Each
# sync rewrites the mirror's history from scratch (single fresh commit) —
# this repo has no history worth preserving, it's pure redistribution.
#
# Required repo secret: MIRROR_PUSH_TOKEN — a fine-grained PAT scoped ONLY
# to Kigiela-Co/skill-16-eyes with "Contents: Read and write" permission.
# The default GITHUB_TOKEN can't push to a different repo/org, hence the
# separate token. One-time setup:
#   1. https://github.com/settings/personal-access-tokens/new
#      Resource owner: Kigiela-Co
#      Repository access: Only select repositories -> skill-16-eyes
#      Permissions: Contents -> Read and write
#   2. gh secret set MIRROR_PUSH_TOKEN --repo kigiela/16-eyes
#      (paste the token when prompted)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build minimal plugin-only mirror content
        run: |
          set -euo pipefail
          rm -rf /tmp/mirror-content
          mkdir -p /tmp/mirror-content
          cp -R .claude-plugin /tmp/mirror-content/
          cp -R skills /tmp/mirror-content/
          cp README.md /tmp/mirror-content/

      - name: Push minimal mirror to Kigiela-Co/skill-16-eyes
        env:
          MIRROR_PUSH_TOKEN: ${{ secrets.MIRROR_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${MIRROR_PUSH_TOKEN:-}" ]; then
            echo "::error::MIRROR_PUSH_TOKEN isn't set as a repo secret — see this workflow's header comment for how to create it. Skipping mirror push."
            exit 1
          fi
          cd /tmp/mirror-content
          git init -q
          git checkout -q -b main
          git config user.name "16-eyes-mirror-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -q -m "Mirror from kigiela/16-eyes@${GITHUB_SHA}"
          git push --force "https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/Kigiela-Co/skill-16-eyes.git" HEAD:main
